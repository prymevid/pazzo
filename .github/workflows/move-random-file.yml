name: Move Random File from Instagram Store

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [ main ]
  repository_dispatch:
    types: [move-random-file]

jobs:
  move-file:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Also updated checkout to v4 for best practice
        
      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list
      
      - name: Run file mover
        id: move
        run: |
          python move_random_file.py
          echo "status=$?" >> $GITHUB_OUTPUT
      
      - name: Upload result as artifact
        # FIXED: Changed from v3 to v4
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: move-result
          path: result.json
          retention-days: 7
      
      - name: Send notification on failure
        if: failure()
        run: |
          echo "❌ File move operation failed!"
          echo "Check the logs for details."
      
      - name: Display success message
        if: success()
        run: |
          echo "✅ File move operation completed successfully!"
          # Optional: Add jq installation if you want to parse JSON
          # sudo apt-get install -y jq
          cat result.json | python -m json.tool # Display formatted JSON
