name: Move Random File from Instagram Store

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [ main ]
  repository_dispatch:
    types: [move-random-file]

jobs:
  move-file:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # Explicitly checkout the main branch
          fetch-depth: 1  # Only get the latest commit
      
      - name: Verify file exists
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in root:"
          ls -la
          echo ""
          echo "Checking for move_random_file.py:"
          if [ -f "move_random_file.py" ]; then
            echo "✅ File found!"
            echo "File contents (first 10 lines):"
            head -n 10 move_random_file.py
          else
            echo "❌ File NOT found!"
            echo "Searching for the file:"
            find . -name "move_random_file.py" -type f
            exit 1
          fi
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Check for requirements.txt
          if [ -f "requirements.txt" ]; then
            echo "✅ Found requirements.txt"
            pip install -r requirements.txt
          else
            echo "Installing boto3 directly"
            pip install boto3==1.34.0
          fi
      
      - name: Run file mover
        run: |
          echo "🚀 Running move_random_file.py"
          python move_random_file.py
      
      - name: Upload result as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: move-result
          path: result.json
          if-no-files-found: warn
          retention-days: 7
