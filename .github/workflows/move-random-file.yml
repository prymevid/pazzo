name: Move Random File from Instagram Store

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [ main ]
  repository_dispatch:
    types: [move-random-file]

jobs:
  move-file:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3==1.34.0
          pip list | grep boto3
      
      - name: Run file mover
        id: move
        run: |
          python move_random_file.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
      
      - name: Debug - List files after run
        run: |
          echo "Current directory contents:"
          ls -la
          echo "Looking for result.json:"
          if [ -f result.json ]; then
            echo "✅ result.json found"
            echo "File contents:"
            cat result.json
          else
            echo "❌ result.json not found"
          fi
      
      - name: Upload result as artifact
        uses: actions/upload-artifact@v4
        if: always()  # This ensures upload even on failure
        with:
          name: move-result
          path: result.json
          if-no-files-found: warn  # Changed from error to warn
          retention-days: 7
      
      - name: Final status
        run: |
          if [ ${{ steps.move.outputs.exit_code }} -eq 0 ]; then
            echo "✅ File move operation completed successfully!"
          else
            echo "❌ File move operation failed!"
          fi
