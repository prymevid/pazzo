name: Move Random File from Instagram Store

on:
  # Manual trigger
  workflow_dispatch:
  
  # Schedule - runs every hour
  schedule:
    - cron: '0 * * * *'  # Every hour at minute 0
  
  # Also trigger on push to main branch (for testing)
  push:
    branches: [ main ]
    
  # Allow HTTP trigger via repository_dispatch
  repository_dispatch:
    types: [move-random-file]

jobs:
  move-file:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list
      
      - name: Run file mover
        id: move
        run: |
          python move_random_file.py
          echo "status=$?" >> $GITHUB_OUTPUT
      
      - name: Upload result as artifact
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: move-result
          path: result.json
          retention-days: 7
      
      - name: Send notification on failure
        if: failure()
        run: |
          echo "❌ File move operation failed!"
          echo "Check the logs for details."
      
      - name: Display success message
        if: success()
        run: |
          echo "✅ File move operation completed successfully!"
          cat result.json | jq .message
