name: Move Random File from Instagram Store

on:
  # Manual trigger
  workflow_dispatch:
  
  # Schedule - runs every hour (customize as needed)
  schedule:
    - cron: '0 * * * *'  # Every hour at minute 0
  
  # Also can be triggered by HTTP request via repository_dispatch
  repository_dispatch:
    types: [move-random-file]

jobs:
  move-file:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Move random file
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python move_random_file.py
      
      - name: Upload result as artifact
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: move-result
          path: result.json
          retention-days: 7
