name: Move Random File from Instagram Store

# =====================================================
# CONFIGURATION - Change these values as needed
# =====================================================

# Schedule settings
on:
  workflow_dispatch:  # Manual trigger
  schedule:
    # Cron schedule: minute hour day-of-month month day-of-week
    # Default: '0 10 * * *' = Runs daily at 10:00 AM UTC
    - cron: '0 10 * * *'
  push:
    branches: [ main ]  # Branch to trigger on push
  repository_dispatch:
    types: [move-random-file]  # Event type for API trigger

# =====================================================
# JOB CONFIGURATION
# =====================================================

jobs:
  move-file:
    runs-on: ubuntu-latest  # Runner type (ubuntu-latest, windows-latest, macos-latest)
    
    # =====================================================
    # STEP CONFIGURATION - Adjust paths and settings below
    # =====================================================
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Branch to checkout (change if using different branch)
          ref: main
          # Number of commits to fetch (0 for all history, 1 for latest only)
          fetch-depth: 1
      
      - name: Verify file exists
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in root:"
          ls -la
          echo ""
          
          # CONFIG: Python script filename
          SCRIPT_NAME="pinterestmover.py"
          
          echo "Checking for $SCRIPT_NAME:"
          if [ -f "$SCRIPT_NAME" ]; then
            echo "✅ File found!"
            echo "File contents (first 10 lines):"
            head -n 10 "$SCRIPT_NAME"
          else
            echo "❌ File NOT found!"
            echo "Searching for the file:"
            find . -name "$SCRIPT_NAME" -type f
            exit 1
          fi
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Python version to use
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          
          # CONFIG: Requirements file name
          REQUIREMENTS_FILE="requirements.txt"
          
          # Check for requirements.txt
          if [ -f "$REQUIREMENTS_FILE" ]; then
            echo "✅ Found $REQUIREMENTS_FILE"
            pip install -r "$REQUIREMENTS_FILE"
          else
            echo "Installing boto3 directly"
            # CONFIG: Default Python packages to install if no requirements.txt
            pip install boto3==1.34.0
            # Add more packages as needed:
            # pip install pandas==2.0.0
            # pip install requests==2.31.0
          fi
      
      - name: Run file mover
        run: |
          echo "🚀 Running move_random_file.py"
          # CONFIG: Python script to execute
          python move_random_file.py
      
      - name: Upload result as artifact
        uses: actions/upload-artifact@v4
        if: always()  # Always upload even if previous step fails
        with:
          # CONFIG: Artifact name
          name: move-result
          # CONFIG: Path to file(s) to upload
          path: result.json
          # CONFIG: What to do if no files found (warn, ignore, error)
          if-no-files-found: warn
          # CONFIG: How many days to retain artifact
          retention-days: 7
